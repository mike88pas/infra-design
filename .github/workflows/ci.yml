name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  sidecar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install sidecar deps
        run: pip install -r sidecar/requirements.txt pytest
      - name: Sidecar handshake smoke test
        shell: pwsh
        run: |
          $out = '{"id":1,"method":"ping"}' | python sidecar/geometry/server.py
          Write-Host $out
          if ($out -notmatch '"pong":\s*true') { exit 1 }
      - name: Sidecar contract tests (import_dxf / polygonize)
        run: python -m pytest sidecar/tests -q
